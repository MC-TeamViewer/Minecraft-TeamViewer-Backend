name: Team View Relay Backend Docker CI

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - dev

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Sync protocol submodule
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            echo "Submodule sync attempt ${attempt}"
            git submodule sync --recursive
            if git -c protocol.version=2 submodule update --init --force --depth=1 --recursive; then
              test -d third_party/TeamViewRelay-Protocol/proto
              git submodule status
              exit 0
            fi
            if [[ "${attempt}" -eq 5 ]]; then
              echo "Submodule update failed after ${attempt} attempts" >&2
              exit 1
            fi
            rm -rf third_party/TeamViewRelay-Protocol
            sleep $((attempt * 5))
          done

      - name: Set up Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate protobuf bindings
        run: ./scripts/generate_proto_python.sh

      - name: Install dependencies
        run: uv sync --extra dev --extra test

      - name: Build admin UI
        working-directory: admin-ui
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm build

      - name: Run tests
        run: UV_CACHE_DIR=/tmp/uv-cache uv run pytest -q

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Sync protocol submodule
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            echo "Submodule sync attempt ${attempt}"
            git submodule sync --recursive
            if git -c protocol.version=2 submodule update --init --force --depth=1 --recursive; then
              test -d third_party/TeamViewRelay-Protocol/proto
              git submodule status
              exit 0
            fi
            if [[ "${attempt}" -eq 5 ]]; then
              echo "Submodule update failed after ${attempt} attempts" >&2
              exit 1
            fi
            rm -rf third_party/TeamViewRelay-Protocol
            sleep $((attempt * 5))
          done

      - name: Set up Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Generate protobuf bindings
        run: ./scripts/generate_proto_python.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
